server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful

spring:
  application:
    name: pet-health-assistant-backend
  datasource:
    url: ${DB_URL:jdbc:mysql://127.0.0.1:3306/pet_health?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false}
    username: ${DB_USERNAME:pet_health_app}
    password: ${DB_PASSWORD:}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 5000
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 3s
  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-migration-naming: true
  jackson:
    default-property-inclusion: non_null
    time-zone: Asia/Shanghai

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

app:
  jwt:
    secret: ${JWT_SECRET:local-development-jwt-secret-change-before-production-2026}
    access-token-ttl: ${JWT_ACCESS_TOKEN_TTL:2h}
  minio:
    endpoint: ${MINIO_ENDPOINT:http://127.0.0.1:9000}
    access-key: ${MINIO_ACCESS_KEY:}
    secret-key: ${MINIO_SECRET_KEY:}
    bucket: ${MINIO_BUCKET:pet-health-assets}
  wechat:
    app-id: ${WECHAT_APP_ID:}
    app-secret: ${WECHAT_APP_SECRET:}
    session-url: ${WECHAT_SESSION_URL:https://api.weixin.qq.com/sns/jscode2session}
  admin:
    initial-username: ${ADMIN_INITIAL_USERNAME:admin}
    initial-password: ${ADMIN_INITIAL_PASSWORD:}
